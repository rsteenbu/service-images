version: '3.8'

secrets:
  nginx_htpasswd:
    file: /home/rsteenbu/secrets/nginx-htpasswd

services:
  nginx:
    image: nginx:1.22
    network_mode: host
    restart: always
    logging:
      driver: syslog
      options:
        syslog-address: "udp://n100d:1514"
        tag: "nginx"
    secrets:
      - nginx_htpasswd
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./sites-enabled:/etc/nginx/sites-enabled:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/log/nginx:/var/log/nginx
