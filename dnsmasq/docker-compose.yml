version: '2'
services:
  dnsmasq:
    image: dockurr/dnsmasq
    container_name: dnsmasq
    network_mode: host
    environment:
      DNS1: "1.0.0.1"
      DNS2: "1.1.1.1"
    cap_add:
      - NET_ADMIN
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "nslookup home.steenburg.net 127.0.0.1 > /dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./dnsmasq.conf:/etc/dnsmasq.conf
      - ./hosts:/etc/hosts
      - /var/tftpd:/var/tftpd


